services:
  web:
    build:
      context: .
      args:
        VITE_DEFAULT_API_URL: ${VITE_DEFAULT_API_URL}
    restart: unless-stopped
    expose:
      - "80"
    environment:
      VIRTUAL_HOST: ${VIRTUAL_HOST}
      VIRTUAL_PORT: "80"
      LETSENCRYPT_HOST: ${LETSENCRYPT_HOST}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    networks:
      - web

networks:
  web:
    external: true
