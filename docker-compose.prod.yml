services:
  web:
    image: ${WEB_IMAGE}
    pull_policy: always
    restart: unless-stopped
    expose:
      - "80"
    environment:
      VIRTUAL_HOST: ${VIRTUAL_HOST}
      VIRTUAL_PORT: "80"
      LETSENCRYPT_HOST: ${LETSENCRYPT_HOST}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    networks:
      - web

networks:
  web:
    external: true
